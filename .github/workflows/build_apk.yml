name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          python3-pip \
          python3-dev \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev \
          automake \
          libltdl-dev

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.33

    - name: Check project files
      run: |
        ls -la
        if [ -f "buildozer.spec" ]; then
          echo "buildozer.spec found"
          cat buildozer.spec
        else
          echo "buildozer.spec NOT found!"
          exit 1
        fi

    - name: Build APK
      run: |
        yes | buildozer android debug 2>&1
      timeout-minutes: 120
      env:
        BUILDOZER_LOG_LEVEL: 2

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: healthcare-app-apk
        path: bin/*.apk
        if-no-files-found: warn
        retention-days: 30
